---
- name: Download Zabbix repo package
  ansible.builtin.get_url:
    url: "https://repo.zabbix.com/zabbix/{{ zabbix_version }}/ubuntu/pool/main/z/zabbix-release/zabbix-release_{{ zabbix_version }}-2+ubuntu24.04_all.deb"
    dest: /tmp/zabbix-release.deb
    mode: "0644"
  tags: zabbix_agent

- name: Install Zabbix repo package
  ansible.builtin.apt:
    deb: /tmp/zabbix-release.deb
  tags: zabbix_agent

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
  tags: zabbix_agent

- name: Install zabbix-agent2 and Docker plugin
  ansible.builtin.apt:
    name:
      - zabbix-agent2
      - zabbix-agent2-plugin-mongodb
    state: present
  tags: zabbix_agent

- name: Add zabbix user to docker group
  ansible.builtin.user:
    name: zabbix
    groups: docker
    append: true
  notify: Restart zabbix-agent2
  tags: zabbix_agent

- name: Deploy zabbix_agent2.conf
  ansible.builtin.template:
    src: zabbix_agent2.conf.j2
    dest: /etc/zabbix/zabbix_agent2.conf
    owner: root
    group: zabbix
    mode: "0640"
  notify: Restart zabbix-agent2
  tags: zabbix_agent

- name: Enable and start zabbix-agent2
  ansible.builtin.systemd:
    name: zabbix-agent2
    state: started
    enabled: true
  tags: zabbix_agent
